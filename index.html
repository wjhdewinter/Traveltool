<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Travel Countdown v10</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="stylesheet" href="./style.css">
<meta name="theme-color" content="#111827">
</head>
<body>
<div class="app">
<header>
  <h1>✈️ Travel Countdown</h1>
  <button id="settingsBtn">⚙️</button>
</header>

<section class="hero">
  <strong>v10 Travel AI</strong>
  <span>Countdown + bestemming + hotel + weer + kaart + AI reisadvies.</span>
  <button id="addBtn">+ Nieuwe reis</button>
</section>

<main id="list"></main>
</div>

<dialog id="formDialog">
<form id="travelForm" class="panel">
<h2 id="formTitle">Nieuwe reis</h2>
<input id="title" placeholder="Naam reis, bijv. Zomervakantie" required>
<input id="location" placeholder="Locatie, bijv. Sousse, Tunesië" required>
<input id="hotel" placeholder="Hotel, bijv. Royal Salem" required>
<input id="date" type="date" required>
<input id="time" type="time" value="12:00" required>
<select id="mood">
<option value="relaxed">😎 Relaxed</option>
<option value="romantisch">❤️ Romantisch</option>
<option value="avontuur">🔥 Avontuur</option>
<option value="familie">👨‍👩‍👧 Familie</option>
</select>
<div class="row">
<button type="button" id="cancelForm">Sluiten</button>
<button>Opslaan</button>
</div>
</form>
</dialog>

<dialog id="detailDialog">
<section class="panel detail">
<button class="close" id="closeDetail">×</button>
<div id="detailContent"></div>
</section>
</dialog>

<dialog id="settingsDialog">
<section class="panel">
<h2>AI instellingen</h2>
<p class="muted">Voor echte AI kun je optioneel je eigen OpenAI API key lokaal op je telefoon opslaan. Zonder key gebruikt de app slimme vaste reisinfo.</p>
<input id="apiKey" type="password" placeholder="OpenAI API key">
<div class="row">
<button id="saveKey">Opslaan</button>
<button id="clearKey">Verwijder key</button>
<button id="closeSettings">Sluiten</button>
</div>
</section>
</dialog>

<script src="./app.js"></script>
</body>
</html>
