<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Final Countdown PRO</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Countdown" />
  <meta name="theme-color" content="#202020" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="icon-btn" id="menuBtn" aria-label="Menu">☰</button>
      <h1>Final Countdown</h1>
      <button class="icon-btn plus" id="addBtn" aria-label="Nieuwe countdown">+</button>
    </header>

    <section class="intro-card">
      <strong>Countdowns</strong>
      <span>Maak timers voor vakantie, deadlines, keuringen of leveringen.</span>
      <button id="installBtn" class="install-btn" hidden>App installeren</button>
    </section>

    <main id="countdownList" class="list"></main>

    <p class="empty" id="emptyState">
      Nog geen countdowns. Tik op de plus om je eerste timer te maken.
    </p>
  </div>

  <dialog id="detailDialog" class="detail-dialog">
    <section class="detail-page">
      <header class="detail-topbar">
        <button class="icon-btn" id="backDetailBtn" aria-label="Terug">‹</button>
        <h1 id="detailHeaderTitle">Final Countd...</h1>
        <button class="icon-btn" id="detailEditBtn" aria-label="Bewerken">✎</button>
        <button class="icon-btn" id="detailPeopleBtn" aria-label="Delen met personen">☷</button>
        <button class="icon-btn" id="detailShareBtn" aria-label="Delen">↗</button>
      </header>

      <div class="detail-spacer"></div>

      <article id="detailContent"></article>
    </section>
  </dialog>

  <dialog id="countdownDialog">
    <form method="dialog" id="countdownForm" class="dialog-card">
      <h2 id="dialogTitle">Nieuwe countdown</h2>

      <label>
        Naam
        <input id="titleInput" type="text" placeholder="Bijv. vakantie" required maxlength="40" />
      </label>

      <label>
        Datum
        <input id="dateInput" type="date" required />
      </label>

      <label>
        Tijd
        <input id="timeInput" type="time" value="16:00" required />
      </label>

      <label>
        Categorie
        <select id="categoryInput">
          <option value="vakantie">Vakantie</option>
          <option value="verjaardag">Verjaardag</option>
          <option value="deadline">Deadline</option>
          <option value="keuring">Keuring</option>
          <option value="levering">Levering</option>
          <option value="anders">Anders</option>
        </select>
      </label>

      <div class="dialog-actions">
        <button type="button" class="ghost" id="cancelBtn">Annuleren</button>
        <button type="submit" class="primary">Opslaan</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
