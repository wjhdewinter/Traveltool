<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Countdown</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --blue: #00d2ff; --card: rgba(255,255,255,0.08); }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { font-weight: 300; letter-spacing: 4px; margin-top: 30px; }
        .input-box { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; backdrop-filter: blur(10px); }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: var(--blue); }
        .btn { width: 90%; padding: 15px; background: var(--blue); color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        #grid { width: 100%; max-width: 500px; margin-top: 40px; }
        .card { background: var(--card); border-top: 3px solid var(--blue); padding: 25px; border-radius: 20px; margin-bottom: 25px; position: relative; backdrop-filter: blur(10px); animation: slide 0.4s ease; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .title { font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .time { font-size: 1.8rem; font-weight: 800; color: var(--blue); font-family: monospace; display: flex; justify-content: space-around; }
        .del-btn { position: absolute; top: 15px; right: 15px; color: #555; background: none; border: none; font-size: 18px; cursor: pointer; }
        .del-btn:hover { color: #ff4444; }
        .unit-label { font-size: 0.6rem; color: #666; text-transform: uppercase; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>COUNTDOWN</h1>

    <div class="input-box">
        <input type="text" id="t" placeholder="Wat is de gebeurtenis?">
        <input type="datetime-local" id="d">
        <button class="btn" onclick="add()">TOEVOEGEN</button>
    </div>

    <div id="grid"></div>

<script>
    let list = JSON.parse(localStorage.getItem('c_down')) || [];

    function add() {
        const t = document.getElementById('t').value;
        const d = document.getElementById('d').value;
        if(!t || !d) return alert("Vul een naam en datum in!");
        list.push({id: Date.now(), t: t, d: new Date(d).getTime(), done: false});
        save(); draw();
        document.getElementById('t').value = '';
    }

    function remove(id) {
        list = list.filter(k => k.id !== id);
        save(); draw();
    }

    function save() { localStorage.setItem('c_down', JSON.stringify(list)); }

    function draw() {
        const g = document.getElementById('grid');
        g.innerHTML = '';
        list.forEach(k => {
            g.innerHTML += `
                <div class="card">
                    <button class="del-btn" onclick="remove(${k.id})">✕</button>
                    <span class="title">${k.t.toUpperCase()}</span>
                    <div class="time" id="klok-${k.id}">Laden...</div>
                </div>
            `;
        });
    }

    setInterval(() => {
        const now = new Date().getTime();
        list.forEach(k => {
            const diff = k.d - now;
            const el = document.getElementById('klok-'+k.id);
            if(!el) return;

            if(diff <= 0) {
                if(!k.done) {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    k.done = true; save();
                }
                el.innerHTML = "TIJD IS OM! 🎉";
            } else {
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.innerHTML = `<div>${d}<span class="unit-label">Dag</span></div> 
                                <div>${h}<span class="unit-label">Uur</span></div> 
                                <div>${m}<span class="unit-label">Min</span></div> 
                                <div>${s}<span class="unit-label">Sec</span></div>`;
            }
        });
    }, 1000);

    draw();
</script>
</body>
</html>
